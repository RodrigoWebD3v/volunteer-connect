version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dependabot/integration"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 2
    groups:
      root-npm-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "npm"
    directory: "/backend"
    target-branch: "dependabot/integration"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 2
    groups:
      backend-npm-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "backend"
      - "security"

  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "dependabot/integration"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 2
    groups:
      frontend-npm-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "frontend"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dependabot/integration"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 2
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
